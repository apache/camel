{{- with .Values.openshift.whoami }}

# Whoami Deployment
# https://github.com/traefik/whoami
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: whoami
  labels:
    app.kubernetes.io/name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: whoami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:{{ .version }}
          args: [ "--port=8080" ]
          ports:
            - containerPort: 8080

# Whoami Service
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: whoami

# Whoami Route
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: whoami
  labels:
    app.kubernetes.io/name: whoami
spec:
  host: whoami.{{ $.Values.openshift.hostName }}
  to:
    kind: Service
    name: whoami
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
{{- end }}
