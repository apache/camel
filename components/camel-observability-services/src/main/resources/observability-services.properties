# Enable management server
camel.management.enabled=true
camel.management.port=9876
camel.management.metricsEnabled=true
camel.management.healthCheckEnabled=true
camel.management.healthPath=/observe/health

camel.health.exposure-level=full
camel.metrics.enabled=true
camel.metrics.path=/observe/metrics
# These binders are typically available by default in all runtimes and
# used for regular container/JVM monitoring
camel.metrics.binders=uptime,processor,jvm-info,jvm-memory,jvm-thread,jvm-gc
camel.metrics.logMetricsOnShutdown=true
camel.metrics.logMetricsOnShutdownFilters=app.info,camel.exchanges.*,process.cpu.usage,jvm.memory.max,jvm.memory.used
# Opentelemetry
camel.opentelemetry2.enabled=true
