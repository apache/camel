<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>camel-route-diagram smoke test</title>
  <script type="module" src="../../main/resources/META-INF/resources/camel/diagram/camel-route-diagram.js"></script>
  <script>
    const mockData = {
      routes: [{
        routeId: 'demo-route',
        from: 'timer:tick',
        code: [
          { type: 'route',     id: 'demo-route', level: 0, code: 'route' },
          { type: 'from',      id: 'from1',      level: 1, code: 'from[timer:tick]', uri: 'timer:tick' },
          { type: 'log',       id: 'log1',       level: 1, code: 'log[Hello World]',
            statistics: { exchangesTotal: 42, exchangesFailed: 1 } },
          { type: 'choice',    id: 'ch1',        level: 1, code: 'choice' },
          { type: 'when',      id: 'wh1',        level: 2, code: 'when[${body} != null]' },
          { type: 'to',        id: 'to1',        level: 3, code: 'to[mock:out]' },
          { type: 'otherwise', id: 'ow1',        level: 2, code: 'otherwise' },
          { type: 'to',        id: 'to2',        level: 3, code: 'to[mock:dead]' },
        ],
      }],
    };
    window.fetch = () => Promise.resolve({ ok: true, json: () => Promise.resolve(mockData) });
  </script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    section { margin-bottom: 2rem; }
    h2 { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>camel-route-diagram smoke test</h1>

  <section>
    <h2>Light mode (auto)</h2>
    <camel-route-diagram src="/q/dev/route-structure"></camel-route-diagram>
  </section>

  <section>
    <h2>Dark mode (forced via CSS override)</h2>
    <camel-route-diagram src="/q/dev/route-structure"
      style="background:#1e293b; --crd-fg:#e2e8f0; --crd-bg:#1e293b; --crd-edge:#475569;">
    </camel-route-diagram>
  </section>
</body>
</html>
