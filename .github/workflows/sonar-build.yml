name: SonarBuild

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md
      - SECURITY.md
      - Jenkinsfile
      - Jenkinsfile.*
      - NOTICE.txt

permissions:
  contents: read

concurrency:
  group: sonar-pr-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'apache/camel'
    name: Build for Sonar Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: install-packages
        uses: ./.github/actions/install-packages

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw install -B -Dquickly

      # Run tests on PR-affected modules with JaCoCo coverage.
      # Per-module reports are generated by jacoco:report (added in parent pom).
      # When core modules are affected, the incremental build also generates
      # the aggregated coverage report via the coverage module.
      - name: Run incremental tests with coverage
        uses: ./.github/actions/incremental-build
        with:
          pr-id: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-upload-suffix: sonar
        env:
          MVND_OPTS: "-Dcoverage -Dmaven.test.failure.ignore=true"


      - name: Prepare compiled classes artifact
        shell: bash
        run: find . -name "target" -type d | tar -czf target.tar.gz -T -

      - name: Upload compiled classes artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        id: target-upload
        with:
          name: sonar-target
          path: target.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Prepare pull request metadata
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TARGET_ARTIFACT_ID: ${{ steps.target-upload.outputs.artifact-id }}
        run: |
          echo "$PR_NUMBER" > pr-event.txt
          echo "$PR_HEAD_REF" >> pr-event.txt
          echo "$PR_BASE_REF" >> pr-event.txt
          echo "$PR_HEAD_SHA" >> pr-event.txt
          echo "$TARGET_ARTIFACT_ID" >> pr-event.txt

      - name: Upload pull request metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sonar-pr-event
          path: pr-event.txt
          if-no-files-found: error
          retention-days: 1
